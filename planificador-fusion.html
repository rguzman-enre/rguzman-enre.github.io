<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador Post-Fusión ENRE - ENARGAS</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/smoothness/jquery-ui.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        #canvas { 
            background: #f3f4f6;
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
            position: relative;
        }
        .building {
            border: 3px solid #1e40af;
            background: rgba(30, 64, 175, 0.1);
            position: absolute;
            cursor: move;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
        .floor {
            border: 2px dashed #3b82f6;
            background: rgba(59, 130, 246, 0.1);
            position: absolute;
            cursor: move;
        }
        .sector {
            border: 2px solid #8b5cf6;
            background: rgba(139, 92, 246, 0.15);
            position: absolute;
            cursor: move;
        }
        .workstation {
            border: 2px solid #10b981;
            background: rgba(16, 185, 129, 0.3);
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: bold;
            color: #065f46;
            cursor: move;
        }
        .selected {
            box-shadow: 0 0 0 4px #f59e0b;
            z-index: 50;
        }
        .agent-item {
            transition: all 0.2s;
        }
        .agent-item.assigned {
            opacity: 0.6;
            text-decoration: line-through;
        }
    </style>
</head>
<body class="bg-gray-100">
    <div class="flex h-screen">
        <!-- Sidebar Izquierdo -->
        <div class="w-72 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-4 border-b bg-blue-600 text-white">
                <h1 class="text-xl font-bold">Planificador ENRE ↔ ENARGAS</h1>
                <p class="text-sm opacity-90">Post-fusión</p>
            </div>
            
            <div class="p-4 flex-1 overflow-auto">
                <div class="mb-6">
                    <h2 class="font-semibold mb-2 text-gray-700">Herramientas</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="addBuilding()" 
                                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm flex items-center justify-center gap-2">
                            <span>🏢</span> Edificio
                        </button>
                        <button onclick="addFloor()" 
                                class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded text-sm flex items-center justify-center gap-2">
                            <span>📍</span> Piso
                        </button>
                        <button onclick="addSector()" 
                                class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm flex items-center justify-center gap-2">
                            <span>🔷</span> Sector
                        </button>
                        <button onclick="addWorkstation()" 
                                class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded text-sm flex items-center justify-center gap-2">
                            <span>🪑</span> Puesto
                        </button>
                    </div>
                </div>

                <div class="mb-6">
                    <h2 class="font-semibold mb-2 text-gray-700">Agentes</h2>
                    <div class="flex gap-2 mb-3">
                        <input id="newAgentName" placeholder="Nombre del agente" 
                               class="flex-1 border border-gray-300 rounded px-3 py-1 text-sm">
                        <button onclick="addAgent()" 
                                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-1 rounded text-sm">Añadir</button>
                    </div>
                    <div id="agentsList" class="max-h-64 overflow-auto border border-gray-200 rounded bg-gray-50 text-sm"></div>
                </div>

                <div>
                    <h2 class="font-semibold mb-2 text-gray-700">Jerarquía</h2>
                    <div id="hierarchy" class="text-sm border border-gray-200 rounded p-3 bg-gray-50 max-h-80 overflow-auto"></div>
                </div>
            </div>

            <div class="p-4 border-t flex gap-2">
                <button onclick="saveToLocalStorage()" 
                        class="flex-1 bg-gray-700 hover:bg-gray-800 text-white py-2 rounded text-sm">💾 Guardar</button>
                <button onclick="loadFromLocalStorage()" 
                        class="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2 rounded text-sm">📂 Cargar</button>
                <button onclick="exportJSON()" 
                        class="flex-1 bg-amber-600 hover:bg-amber-700 text-white py-2 rounded text-sm">📤 JSON</button>
            </div>
        </div>

        <!-- Canvas Principal -->
        <div class="flex-1 flex flex-col">
            <div class="bg-white border-b px-6 py-3 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h2 class="font-semibold text-lg" id="canvasTitle">Plano General</h2>
                    <div class="flex items-center gap-2 text-xs text-gray-500">
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 bg-blue-600 rounded"></div> Edificio
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 border-2 border-blue-500 rounded"></div> Piso
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 border-2 border-purple-500 rounded"></div> Sector
                        </div>
                        <div class="flex items-center gap-1">
                            <div class="w-3 h-3 border-2 border-emerald-500 rounded"></div> Puesto
                        </div>
                    </div>
                </div>
                
                <div class="flex items-center gap-3">
                    <button onclick="clearAll()" 
                            class="px-4 py-1 text-red-600 hover:bg-red-50 rounded text-sm">🗑️ Limpiar todo</button>
                    <button onclick="autoAssignDemo()" 
                            class="px-4 py-1 bg-teal-600 text-white hover:bg-teal-700 rounded text-sm">Demo Rápida</button>
                </div>
            </div>

            <div id="canvas" class="flex-1 relative" style="min-height: 600px;"></div>
        </div>

        <!-- Panel Derecho -->
        <div class="w-80 bg-white border-l border-gray-200 flex flex-col">
            <div class="p-4 border-b">
                <h2 class="font-semibold text-gray-700">Propiedades</h2>
            </div>
            
            <div id="propertiesPanel" class="flex-1 p-4 overflow-auto text-sm">
                <div class="text-gray-500 italic">Selecciona un elemento para editar sus propiedades</div>
            </div>

            <div class="p-4 border-t bg-gray-50">
                <div class="text-xs text-gray-500 mb-2">Asignación masiva</div>
                <button onclick="assignSelectedAgentsToSector()" 
                        class="w-full bg-violet-600 hover:bg-violet-700 text-white py-3 rounded font-medium">
                    Asignar agentes seleccionados a Sector actual
                </button>
            </div>
        </div>
    </div>

    <script>
        // Modelo de datos
        let model = {
            buildings: [],
            agents: [],
            nextId: 1
        };

        let selectedElement = null;
        let selectedAgents = new Set();

        // Generar ID único
        function getNextId() {
            return 'el-' + (model.nextId++);
        }

        // Renderizar canvas
        function renderCanvas() {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = '';
            
            model.buildings.forEach(building => {
                const bEl = createElement(building, 'building');
                canvas.appendChild(bEl);
                
                building.floors.forEach(floor => {
                    const fEl = createElement(floor, 'floor');
                    bEl.appendChild(fEl);
                    
                    floor.sectors.forEach(sector => {
                        const sEl = createElement(sector, 'sector');
                        fEl.appendChild(sEl);
                        
                        sector.workstations.forEach(ws => {
                            const wsEl = createElement(ws, 'workstation');
                            sEl.appendChild(wsEl);
                        });
                    });
                });
            });
            
            renderHierarchy();
            renderAgentsList();
        }

        function createElement(item, type) {
            const el = document.createElement('div');
            el.className = type;
            el.style.left = (item.x || 50) + 'px';
            el.style.top = (item.y || 50) + 'px';
            el.style.width = (item.width || 220) + 'px';
            el.style.height = (item.height || 180) + 'px';
            el.dataset.id = item.id;
            
            if (type === 'workstation') {
                el.style.width = '90px';
                el.style.height = '70px';
                el.innerHTML = `<div class="text-center leading-tight">\( {item.name}<br><small> \){item.assigned ? item.assigned.length : 0}👤</small></div>`;
            } else {
                el.innerHTML = `<div class="absolute top-1 left-1 bg-white/80 text-[10px] px-1.5 py-0.5 rounded font-mono">${item.name}</div>`;
            }
            
            // Hacer draggable
            $(el).draggable({
                containment: 'parent',
                stack: '.building, .floor, .sector, .workstation',
                stop: function(event, ui) {
                    updatePositionFromDOM(item, ui.position);
                }
            });
            
            // Hacer resizable (solo edificios y workstations)
            if (type === 'building' || type === 'workstation') {
                $(el).resizable({
                    containment: type === 'building' ? '#canvas' : 'parent',
                    stop: function(event, ui) {
                        updateSizeFromDOM(item, ui.size);
                    }
                });
            }
            
            // Click para seleccionar
            el.addEventListener('click', (e) => {
                e.stopImmediatePropagation();
                selectElement(item, el);
            });
            
            return el;
        }

        function updatePositionFromDOM(item, pos) {
            item.x = pos.left;
            item.y = pos.top;
        }

        function updateSizeFromDOM(item, size) {
            item.width = size.width;
            item.height = size.height;
        }

        function selectElement(item, domEl) {
            // Quitar selección anterior
            document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'));
            
            if (domEl) domEl.classList.add('selected');
            selectedElement = item;
            renderProperties();
        }

        function renderProperties() {
            const panel = document.getElementById('propertiesPanel');
            if (!selectedElement) {
                panel.innerHTML = `<div class="text-gray-500 italic">Selecciona un elemento...</div>`;
                return;
            }
            
            let html = `
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Nombre</label>
                        <input value="${selectedElement.name || ''}" 
                               onblur="updateName('${selectedElement.id}', this.value)" 
                               class="w-full border border-gray-300 rounded px-3 py-2">
                    </div>
            `;
            
            if (selectedElement.type === 'workstation' && selectedElement.assigned) {
                html += `
                    <div>
                        <label class="block text-xs font-medium text-gray-500 mb-1">Agentes asignados</label>
                        <div class="text-sm bg-gray-100 p-3 rounded">
                            ${selectedElement.assigned.map(a => `<div class="py-1">• ${a.name}</div>`).join('')}
                        </div>
                    </div>
                `;
            }
            
            html += `</div>`;
            panel.innerHTML = html;
        }

        function updateName(id, newName) {
            // Buscar elemento por ID y actualizar
            function findAndUpdate(arr) {
                for (let item of arr) {
                    if (item.id === id) {
                        item.name = newName;
                        return true;
                    }
                    if (item.floors) {
                        for (let floor of item.floors) {
                            if (floor.id === id) {
                                floor.name = newName; return true;
                            }
                            if (floor.sectors) {
                                for (let sector of floor.sectors) {
                                    if (sector.id === id) {
                                        sector.name = newName; return true;
                                    }
                                    if (sector.workstations) {
                                        for (let ws of sector.workstations) {
                                            if (ws.id === id) {
                                                ws.name = newName; return true;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
                return false;
            }
            findAndUpdate(model.buildings);
            renderCanvas();
        }

        // Añadir elementos
        function addBuilding() {
            const building = {
                id: getNextId(),
                type: 'building',
                name: `Edificio ${model.buildings.length + 1}`,
                x: 80 + model.buildings.length * 40,
                y: 60 + model.buildings.length * 30,
                width: 280,
                height: 240,
                floors: []
            };
            model.buildings.push(building);
            renderCanvas();
            selectElement(building);
        }

        function addFloor() {
            if (!selectedElement || selectedElement.type !== 'building') {
                alert("Selecciona un Edificio primero");
                return;
            }
            const floor = {
                id: getNextId(),
                type: 'floor',
                name: `Piso ${selectedElement.floors.length + 1}`,
                x: 20,
                y: 40,
                width: selectedElement.width - 60,
                height: selectedElement.height - 90,
                sectors: []
            };
            selectedElement.floors.push(floor);
            renderCanvas();
            selectElement(floor);
        }

        function addSector() {
            let parent = null;
            if (selectedElement && selectedElement.type === 'floor') parent = selectedElement;
            else if (selectedElement && selectedElement.type === 'sector') parent = findParentFloor(selectedElement);
            
            if (!parent) {
                alert("Selecciona un Piso primero");
                return;
            }
            
            const sector = {
                id: getNextId(),
                type: 'sector',
                name: `Sector ${parent.sectors ? parent.sectors.length + 1 : 1}`,
                x: 30,
                y: 30,
                width: 160,
                height: 110,
                workstations: []
            };
            if (!parent.sectors) parent.sectors = [];
            parent.sectors.push(sector);
            renderCanvas();
            selectElement(sector);
        }

        function addWorkstation() {
            let parentSector = null;
            if (selectedElement && selectedElement.type === 'sector') parentSector = selectedElement;
            else if (selectedElement && selectedElement.type === 'workstation') parentSector = findParentSector(selectedElement);
            
            if (!parentSector) {
                alert("Selecciona un Sector primero");
                return;
            }
            
            const ws = {
                id: getNextId(),
                type: 'workstation',
                name: `Puesto ${parentSector.workstations.length + 1}`,
                x: 40 + parentSector.workstations.length * 20,
                y: 40,
                width: 90,
                height: 70,
                assigned: []
            };
            if (!parentSector.workstations) parentSector.workstations = [];
            parentSector.workstations.push(ws);
            renderCanvas();
            selectElement(ws);
        }

        function findParentFloor(sector) {
            for (let b of model.buildings) {
                for (let f of b.floors) {
                    if (f.sectors && f.sectors.some(s => s.id === sector.id)) return f;
                }
            }
            return null;
        }

        function findParentSector(ws) {
            for (let b of model.buildings) {
                for (let f of b.floors) {
                    for (let s of f.sectors || []) {
                        if (s.workstations && s.workstations.some(w => w.id === ws.id)) return s;
                    }
                }
            }
            return null;
        }

        // Agentes
        function addAgent() {
            const nameInput = document.getElementById('newAgentName');
            const name = nameInput.value.trim();
            if (!name) return;
            
            model.agents.push({
                id: getNextId(),
                name: name,
                assignedTo: null
            });
            nameInput.value = '';
            renderAgentsList();
        }

        function renderAgentsList() {
            const container = document.getElementById('agentsList');
            container.innerHTML = '';
            
            model.agents.forEach(agent => {
                const div = document.createElement('div');
                div.className = `agent-item px-3 py-2 hover:bg-white border-b border-gray-100 flex justify-between items-center cursor-pointer ${agent.assignedTo ? 'assigned' : ''}`;
                div.innerHTML = `
                    <span>${agent.name}</span>
                    ${agent.assignedTo ? `<span class="text-xs text-emerald-600">✓</span>` : ''}
                `;
                div.onclick = () => toggleAgentSelection(agent.id);
                container.appendChild(div);
